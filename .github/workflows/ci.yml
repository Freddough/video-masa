name: Validation

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos-validation:
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install test dependency
        run: python -m pip install Flask==3.1.3
      - name: Validate source and packaging contracts
        env:
          PYTHON_BIN: python
        run: scripts/validate_release.sh
